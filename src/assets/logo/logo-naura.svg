<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 180" fill="none">
  <!-- Icon mark: Arch with N, chair, leaf -->
  <g transform="translate(108, 8)">
    <!-- Outer arch -->
    <path d="M8 80 L8 40 Q8 8 42 8 Q76 8 76 40 L76 80" stroke="#7A5C45" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- Inner left vertical of N -->
    <line x1="18" y1="30" x2="18" y2="80" stroke="#7A5C45" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Diagonal of N -->
    <line x1="18" y1="30" x2="52" y2="72" stroke="#7A5C45" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Inner right vertical of N -->
    <line x1="52" y1="30" x2="52" y2="80" stroke="#7A5C45" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Chair: seat -->
    <rect x="30" y="60" width="22" height="3.5" rx="1" fill="#7A5C45"/>
    <!-- Chair: backrest -->
    <rect x="30" y="47" width="22" height="3" rx="1" fill="#7A5C45"/>
    <!-- Chair: back support post -->
    <rect x="48" y="47" width="3" height="13" rx="1" fill="#7A5C45"/>
    <!-- Chair: legs -->
    <line x1="33" y1="63.5" x2="33" y2="80" stroke="#7A5C45" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="49" y1="63.5" x2="49" y2="80" stroke="#7A5C45" stroke-width="2.8" stroke-linecap="round"/>

    <!-- Leaf 1 (center) -->
    <path d="M52 38 Q56 22 64 18 Q64 30 52 38Z" stroke="#7A5C45" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
    <!-- Leaf 2 (left) -->
    <path d="M52 38 Q44 22 50 14 Q58 20 52 38Z" stroke="#7A5C45" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
    <!-- Leaf 3 (right) -->
    <path d="M64 18 Q72 20 70 30 Q62 28 64 18Z" stroke="#7A5C45" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
    <!-- Leaf stem -->
    <line x1="52" y1="38" x2="58" y2="18" stroke="#7A5C45" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- NAURA text -->
  <text x="150" y="118" font-family="'Playfair Display', Georgia, serif" font-size="34" font-weight="700" fill="#7A5C45" text-anchor="middle" letter-spacing="6">NAURA</text>

  <!-- Divider line -->
  <line x1="110" y1="125" x2="190" y2="125" stroke="#7A5C45" stroke-width="1.2"/>

  <!-- INTERIOR DESIGN text -->
  <text x="150" y="142" font-family="'Montserrat', sans-serif" font-size="11" font-weight="500" fill="#7A5C45" text-anchor="middle" letter-spacing="4">INTERIOR DESIGN</text>
</svg>
