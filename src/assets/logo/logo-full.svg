<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Metallic silver gradient for the A shape -->
    <linearGradient id="metalA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e8e8;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#b0b0b0;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#d8d8d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#909090;stop-opacity:1" />
    </linearGradient>
    <!-- Orange gradient for the arrow -->
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#c94a10;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#EA6522;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8c4a;stop-opacity:1" />
    </linearGradient>
    <!-- Inner shadow for 3D depth -->
    <linearGradient id="metalAInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#606060;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#404040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#282828;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="glowOrange" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#EA6522" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- ===== LETTER A — outer metallic shape ===== -->
  <g filter="url(#shadow)">
    <!-- Left leg of A -->
    <polygon points="200,48 155,230 175,230 210,85" fill="url(#metalA)" />
    <!-- Right leg of A -->
    <polygon points="200,48 245,230 225,230 190,85" fill="url(#metalA)" />

    <!-- Left leg inner dark face (3D bevel) -->
    <polygon points="200,55 160,228 168,228 204,78" fill="url(#metalAInner)" opacity="0.7"/>
    <!-- Right leg inner dark face -->
    <polygon points="200,55 240,228 232,228 196,78" fill="url(#metalAInner)" opacity="0.7"/>

    <!-- Crossbar of A -->
    <rect x="168" y="165" width="64" height="18" fill="url(#metalA)" rx="0"/>
    <!-- Crossbar inner bevel -->
    <rect x="173" y="168" width="54" height="12" fill="url(#metalAInner)" opacity="0.5"/>
  </g>

  <!-- ===== ORANGE ARROW ===== -->
  <g filter="url(#glowOrange)">
    <!-- Arrow shaft (vertical line through A) -->
    <rect x="195" y="80" width="10" height="168" fill="url(#arrowGrad)" />

    <!-- Arrow head (pointing up) -->
    <polygon points="200,30 183,72 217,72" fill="url(#arrowGrad)" />

    <!-- Arrow chevron at bottom (pointing down / tail) -->
    <polygon points="188,240 200,256 212,240 206,240 200,250 194,240" fill="url(#arrowGrad)" />
    <!-- Second chevron -->
    <polygon points="188,254 200,270 212,254 206,254 200,264 194,254" fill="url(#arrowGrad)" />
  </g>

  <!-- ===== TEXT ===== -->
  <!-- AMANAH -->
  <text
    x="200"
    y="310"
    font-family="Montserrat, Arial, sans-serif"
    font-size="42"
    font-weight="800"
    fill="#2a2a2a"
    text-anchor="middle"
    letter-spacing="4"
  >AMANAH</text>

  <!-- CIPTA RUANG -->
  <text
    x="200"
    y="348"
    font-family="Montserrat, Arial, sans-serif"
    font-size="28"
    font-weight="500"
    fill="#3a3a3a"
    text-anchor="middle"
    letter-spacing="6"
  >CIPTA RUANG</text>

  <!-- Tagline -->
  <text
    x="200"
    y="376"
    font-family="'Times New Roman', Georgia, serif"
    font-size="14"
    font-weight="400"
    font-style="italic"
    fill="#666666"
    text-anchor="middle"
    letter-spacing="1"
  >Architectural Renovation &amp; Interior</text>
</svg>
